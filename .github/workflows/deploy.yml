name: Antigravity Deployment (Shinylive)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v4)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Dependencies
        run: |
          Rscript -e "install.packages(c('shinylive', 'httpuv'), repos = 'https://cran.rstudio.com/')"

      - name: Export Shinylive App (Wasm)
        run: |
          # Use the export script to maintain consistency with local environment
          Rscript export_app.R

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
